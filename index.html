<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الشرطة | L.S.P.D</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Rajdhani:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-deep: #030509;
            --glass-bg: rgba(15, 20, 30, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --cyan: #00eaff;
            --cyan-glow: rgba(0, 234, 255, 0.5);
            --red: #ff3333;
            --green: #00ff6a;
            --yellow: #ffc107;
            --text-main: #ffffff;
            --font-ar: 'Tajawal', sans-serif;
            --font-en: 'Rajdhani', sans-serif;
            --row-bg: rgba(20, 26, 40, 0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { user-select: none; background: #020305; color: var(--text-main); font-family: var(--font-ar); min-height: 100vh; overflow: hidden; }
        input, textarea, select, .crypto-res, .task-table td, .allow-select, .allow-select * { user-select: text !important; }

        /* 🟢 الخلفية الفخمة (بدون لاق) 🟢 */
        #star-bg { position: fixed; inset: 0; z-index: -5; pointer-events: none; overflow: hidden; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle linear infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 8px rgba(0, 234, 255, 0.8); } }

        #bg-lights { position: fixed; inset: 0; z-index: -4; pointer-events: none; }
        .light-red { position: absolute; top: -30%; left: -20%; width: 70vw; height: 70vw; background: radial-gradient(circle, rgba(255, 0, 40, 0.1) 0%, transparent 70%); mix-blend-mode: screen; animation: pulse 4s infinite alternate; }
        .light-blue { position: absolute; bottom: -30%; right: -20%; width: 70vw; height: 70vw; background: radial-gradient(circle, rgba(0, 160, 255, 0.1) 0%, transparent 70%); mix-blend-mode: screen; animation: pulse 4s infinite alternate-reverse; }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        #bg-pursuit { position: fixed; inset: 0; z-index: -3; pointer-events: none; }
        .speed-line { position: absolute; width: 2px; height: 150px; background: linear-gradient(to bottom, transparent, rgba(0, 234, 255, 0.5), transparent); animation: speedFall linear infinite; }
        .speed-line.red { background: linear-gradient(to bottom, transparent, rgba(255, 51, 51, 0.5), transparent); }
        @keyframes speedFall { 0% { transform: translateY(-200px); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(120vh); opacity: 0; } }

        .central-logo-bg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; z-index: -1; opacity: 0.03; pointer-events: none; background-image: url('yyW7oBx.jpg'); background-size: cover; background-position: center; border-radius: 50%; clip-path: circle(47% at 50% 50%); }

        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 🟢 شاشة تسجيل الدخول (تم إصلاحها) 🟢 */
        #loginScreen { position: fixed; inset: 0; background: rgba(3, 5, 9, 0.9); z-index: 99999; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(15px); transition: opacity 0.3s ease;}
        .login-container { width: 420px; padding: 40px 30px; background: rgba(10, 15, 20, 0.95); border: 1px solid var(--cyan); border-radius: 16px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px rgba(0,234,255,0.1); animation: popIn 0.4s ease-out; }
        .login-logo { width: 110px; height: 110px; background: url('yyW7oBx.jpg') center/cover; border-radius: 50%; margin: 0 auto 25px auto; border: 2px solid var(--cyan); box-shadow: 0 0 25px var(--cyan-glow); }
        .login-title { font-size: 1.8rem; color: #fff; margin-bottom: 30px; font-weight: 900; letter-spacing: 1px; text-shadow: 0 0 10px rgba(0,234,255,0.4);}
        .inp-group { position: relative; margin-bottom: 20px; }
        .inp-group i { position: absolute; top: 50%; transform: translateY(-50%); color: var(--cyan); right: 15px; font-size: 1.2rem; }
        .login-input { width: 100%; padding: 15px 45px 15px 15px; background: rgba(0,0,0,0.6); border: 1px solid rgba(0,234,255,0.2); color: #fff; outline: none; border-radius: 8px; font-family: var(--font-ar); font-size: 1.1rem; transition: 0.3s; text-align: right;}
        .login-input:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,234,255,0.2); }
        .login-btn { width: 100%; padding: 15px; margin-top: 10px; background: var(--cyan); border: none; color: #000; font-weight: 900; font-size: 1.3rem; border-radius: 8px; cursor: pointer; transition: 0.3s; font-family: var(--font-ar); box-shadow: 0 5px 15px rgba(0,234,255,0.2);}
        .login-btn:hover { background: #fff; box-shadow: 0 0 25px var(--cyan-glow); transform: translateY(-2px);}
        .error-msg { color: #fff; font-size: 1rem; margin-top: 20px; display: none; font-weight: bold; background: rgba(255,51,51,0.2); border: 1px solid var(--red); padding: 10px; border-radius: 6px;}

        /* 🟢 لوحة التحكم الأساسية 🟢 */
        #mainWrapper { position: fixed; inset: 0; z-index: 10; display: none; flex-direction: column; overflow: hidden; background: transparent; animation: fadeIn 0.3s ease;}
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; z-index: 10; border-bottom: 1px solid var(--glass-border); background: rgba(10,15,25,0.85); backdrop-filter: blur(10px);}
        .header-side { display: flex; gap: 15px; align-items: center; }
        .pill-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 30px; color: #ddd; font-size: 1rem; font-weight: bold; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; }
        .pill-btn:hover { background: var(--cyan); color: #000; border-color: var(--cyan); box-shadow: 0 0 15px var(--cyan-glow);}
        .sys-title { font-size: 1.4rem; font-weight: 900; color: #fff; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.2);}

        #dashboardView { flex: 1; display: flex; align-items: center; justify-content: center; padding-bottom: 40px; overflow-y: auto; flex-direction: column;}
        .main-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 80%; max-width: 1000px; margin: 0 auto; }
        
        .menu-btn { 
            background: linear-gradient(145deg, rgba(20, 26, 40, 0.8), rgba(10, 15, 25, 0.95));
            border: 1px solid rgba(0, 234, 255, 0.15); border-radius: 16px; padding: 30px 20px; 
            text-align: center; color: #fff; font-size: 1.3rem; font-weight: 800; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); position: relative; overflow: hidden;
        }
        .menu-btn::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); opacity: 0; transition: 0.3s; }
        .menu-btn:hover { border-color: rgba(0, 234, 255, 0.5); color: #fff; box-shadow: 0 15px 40px rgba(0, 234, 255, 0.2); transform: translateY(-5px); }
        .menu-btn:hover::before { opacity: 1; box-shadow: 0 0 15px var(--cyan); }

        .dashboard-top-logo { width: 160px; height: 160px; object-fit: cover; border-radius: 50%; border: 3px solid var(--cyan); box-shadow: 0 0 40px rgba(0, 234, 255, 0.3); margin-bottom: 50px;}

        /* 🟢 قسم عرض البيانات داخل لوحة التحكم 🟢 */
        #moduleView { display: none; flex: 1; flex-direction: column; width: 90%; max-width: 1400px; margin: 0 auto; max-height: calc(100vh - 100px); padding-bottom: 20px; animation: popIn 0.3s ease; }
        .module-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-top: 20px; margin-bottom: 20px; flex-direction: row-reverse; }
        .module-title { font-size: 1.8rem; color: var(--cyan); font-weight: 900; margin: 0; text-shadow: 0 0 15px var(--cyan-glow);}
        
        #dynamicContentArea { flex: 1; overflow-y: auto; margin-bottom: 20px; padding-right: 10px; }
        #dynamicContentArea::-webkit-scrollbar { width: 6px; } #dynamicContentArea::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 6px; }

        .input-section { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 25px; border-radius: 12px; backdrop-filter: blur(10px);}
        .gen-input { width: 100%; padding: 15px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: #fff; margin-bottom: 15px; border-radius: 8px; outline: none; transition: 0.3s; font-family: var(--font-ar); font-size: 1.05rem; text-align: right;}
        .gen-input:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,234,255,0.1);}
        select.gen-input { appearance: none; cursor: pointer; } 
        select.gen-input option { background: #0b0e14; color: #fff; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 0; }
        
        .submit-btn { width: 100%; padding: 15px; background: var(--cyan); border: none; font-weight: 900; font-size: 1.2rem; border-radius: 8px; cursor: pointer; color: #000; transition: 0.3s; font-family: var(--font-ar); }
        .submit-btn:hover { background: #fff; box-shadow: 0 0 20px var(--cyan-glow); transform: translateY(-2px);}
        
        .close-btn { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #ccc; padding: 15px; cursor: pointer; border-radius: 8px; transition: 0.3s; font-family: var(--font-ar); font-weight: bold; font-size: 1.1rem;}
        .close-btn:hover { border-color: var(--red); color: #fff; background: rgba(255,51,51,0.2); }

        .rec-item { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: flex-start; color: #ddd; font-size: 1.05rem; background: rgba(20,26,40,0.8); border-radius: 10px; margin-bottom: 12px; border: 1px solid var(--btn-border); backdrop-filter: blur(5px);}
        .action-icon { cursor: pointer; margin: 0 8px; font-size: 1.3rem; transition: 0.2s; opacity: 0.8;}
        .action-icon:hover { transform: scale(1.2); opacity: 1; }
        .icon-del { color: var(--red); }
        
        .badge-status { padding: 6px 15px; border-radius: 6px; font-weight: bold; font-size: 0.95rem; border: 1px solid; }

        /* 🟢 تنسيق جدول الإدارة الفخم (بدون لاق) 🟢 */
        .roster-wrapper { width: 100%; background: var(--glass-bg); margin-bottom: 30px; border: 1px solid var(--glass-border); border-radius: 16px; padding: 30px; backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow-x: auto; }
        .luxury-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; text-align: center; font-family: 'Rajdhani', 'Tajawal', sans-serif;}
        .luxury-table thead th { color: var(--cyan); font-size: 1rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; padding: 0 20px 15px 20px; border-bottom: 1px solid rgba(0,234,255,0.3); }
        
        .roster-row { background: var(--row-bg); box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: all 0.2s ease; }
        .roster-row:hover { transform: translateY(-2px); background: rgba(30, 40, 60, 0.9); box-shadow: 0 10px 25px rgba(0,234,255,0.15); }
        
        .luxury-table td { padding: 18px 20px; color: #fff; font-size: 1.1rem; font-weight: 600; border-top: 1px solid rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.02); white-space: nowrap; }
        .luxury-table td:first-child { border-radius: 10px 0 0 10px; border-left: 3px solid var(--cyan); color: var(--cyan); font-weight: 900; font-size: 1.2rem; }
        .luxury-table td:last-child { border-radius: 0 10px 10px 0; border-right: 1px solid rgba(255,255,255,0.02); }
        
        .dept-header td { padding: 40px 0 15px 0; text-align: left; border: none !important; background: transparent !important; box-shadow: none !important; }
        .dept-title { display: inline-block; color: #fff; font-size: 1.5rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; padding-bottom: 8px; border-bottom: 2px solid var(--cyan); text-shadow: 0 0 15px var(--cyan-glow); }
        
        .action-btn-mini { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 8px 12px; cursor: pointer; font-size: 1.1rem; transition: 0.2s; margin: 0 5px; }
        .btn-edit { color: var(--yellow); }
        .btn-edit:hover { background: rgba(255, 193, 7, 0.2); border-color: var(--yellow); transform: translateY(-2px);}
        .btn-del { color: var(--red); }
        .btn-del:hover { background: rgba(255, 51, 51, 0.2); border-color: var(--red); transform: translateY(-2px);}

        /* 🟢 النوافذ المنبثقة 🟢 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(3, 5, 9, 0.95); z-index: 100000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-box { width: 500px; padding: 40px; background: rgba(10, 15, 25, 0.98); border: 1px solid var(--cyan); border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(0,234,255,0.1); animation: popIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        
        /* 🟢 الهوية 🟢 */
        .executive-card { width: 650px; height: 300px; background: #0b0e14; border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.9); display: flex; flex-direction: row-reverse; align-items: center; padding: 30px; position: relative; border: 1px solid rgba(255,255,255,0.05); border-right: 3px solid var(--cyan); }
        .card-left { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-right: auto; width: 200px; }
        .profile-img-wrapper { width: 150px; height: 150px; border-radius: 20px; border: 2px solid var(--cyan); padding: 4px; position: relative; background: rgba(0, 234, 255, 0.05); box-shadow: 0 0 20px rgba(0,234,255,0.2); }
        .profile-img-card { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; background: #111; }
        .card-right { display: flex; flex-direction: column; align-items: flex-end; text-align: right; width: calc(100% - 220px); }
        .sys-title-card { color: #666; font-family: var(--font-en); font-size: 1rem; letter-spacing: 3px; font-weight: 800; margin-bottom: 5px; }
        .name-card { margin: 0; font-size: 2.8rem; font-weight: 900; color: #fff; font-family: var(--font-en); text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .rank-card { margin: 5px 0 20px 0; color: var(--cyan); font-family: var(--font-en); font-size: 1.3rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        .simple-status { display: inline-flex; align-items: center; gap: 10px; background: rgba(0, 255, 106, 0.05); border: 1px solid rgba(0, 255, 106, 0.3); padding: 8px 20px; border-radius: 8px; font-family: var(--font-en); font-weight: 800; font-size: 1.1rem; color: var(--green); flex-direction: row-reverse; }
        .card-controls { margin-top: 30px; display: flex; gap: 15px; }
    </style>
</head>
<body id="appBody">

    <script src="config.js"></script>

    <div id="star-bg"></div>
    <div id="bg-lights"><div class="light-red"></div><div class="light-blue"></div></div>
    <div id="bg-pursuit"></div>

    <div id="loginScreen">
        <div class="login-container">
            <div class="login-logo"></div>
            <div class="login-title">نظام إدارة الشرطة</div>
            <div class="inp-group">
                <i class="fa-solid fa-id-card"></i>
                <input type="text" id="userInput" class="login-input" placeholder="اسم المستخدم">
            </div>
            <div class="inp-group">
                <i class="fa-solid fa-key"></i>
                <input type="password" id="passInput" class="login-input" placeholder="كلمة المرور">
            </div>
            <button class="login-btn" onclick="login()">تسجيل الدخول</button>
            <div class="error-msg" id="loginError">بيانات الدخول غير صحيحة، يرجى المحاولة مجدداً</div>
        </div>
    </div>

    <div id="idCardOverlay" class="modal-overlay">
        <div style="display:flex; flex-direction:column; align-items:center;">
            <div class="executive-card">
                <div class="card-left">
                    <div class="profile-img-wrapper"><img id="cardImage" src="https://cdn.discordapp.com/attachments/1079065638502404167/1476016754705567824/D25Todl.png" class="profile-img-card"></div>
                </div>
                <div class="card-right">
                    <div class="sys-title-card">L.S.P.D EXECUTIVE ID</div>
                    <h2 class="name-card" id="cardNameDisp">--</h2>
                    <div class="rank-card" id="cardRankDisp">--</div>
                    <div style="border-top: 1px solid rgba(255,255,255,0.05); width: 100%; margin-bottom: 20px;"></div>
                    <div class="simple-status">SYSTEM ACTIVE <div style="width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green);"></div></div>
                </div>
            </div>
            <div class="card-controls">
                <label class="pill-btn" style="cursor: pointer;"><i class="fa-solid fa-camera"></i> تغيير الصورة<input type="file" accept="image/*" style="display: none;" onchange="updateCardImg(this)"></label>
                <button class="pill-btn" onclick="document.getElementById('idCardOverlay').style.display='none'" style="border-color: var(--red); color: var(--red);">إغلاق الهوية</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="editRankModal">
        <div class="modal-box">
            <h3 style="color:var(--cyan); margin-bottom:25px; font-size:1.6rem; text-align:center;">تعديل السجل العسكري</h3>
            
            <div style="text-align: right; color: #8da2b5; font-weight: bold; margin-bottom: 8px; font-size: 1rem;">الاسم الشخصي:</div>
            <input type="text" id="editOfficerName" class="gen-input" placeholder="اسم العسكري" style="margin-bottom: 20px;">
            
            <div style="text-align: right; color: #8da2b5; font-weight: bold; margin-bottom: 8px; font-size: 1rem;">الرقم العسكري (Unit Code):</div>
            <input type="text" id="editOfficerCode" class="gen-input" placeholder="مثال: C-15" style="margin-bottom: 20px;">
            
            <div style="text-align: right; color: #8da2b5; font-weight: bold; margin-bottom: 8px; font-size: 1rem;">الرتبة العسكرية:</div>
            <select id="editRankSelect" class="gen-input" style="margin-bottom: 30px;"></select>
            
            <div style="display:flex; gap:15px;">
                <button class="submit-btn" onclick="saveNewOfficerData()" style="flex: 2;">حفظ التعديلات</button>
                <button class="close-btn" onclick="document.getElementById('editRankModal').style.display='none'" style="flex: 1;">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="customAlertOverlay">
        <div class="modal-box" id="customAlertBox" style="width: 400px; text-align: center;">
            <i class="fa-solid fa-circle-exclamation" style="font-size: 4rem; color: var(--cyan); margin-bottom: 20px;" id="alertIcon"></i>
            <h3 style="color: #fff; font-size: 1.8rem; font-weight: bold; margin-bottom: 15px;" id="alertTitle">تنبيه</h3>
            <p style="color: #aaa; font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px;" id="alertMessage">رسالة التنبيه</p>
            <button class="submit-btn" onclick="document.getElementById('customAlertOverlay').style.display='none'">حسناً</button>
        </div>
    </div>

    <div id="mainWrapper">
        <div class="central-logo-bg"></div>
        <header>
            <div class="header-side">
                <div class="pill-btn" onclick="goHome()" title="الرئيسية"><i class="fa-solid fa-house"></i> الرئيسية</div>
                <div class="pill-btn" onclick="logout()" title="تسجيل الخروج" style="border-color: var(--red); color: var(--red);"><i class="fa-solid fa-power-off"></i> خروج</div>
            </div>
            <div class="sys-title">إدارة الشرطة</div>
            <div class="header-side">
                <div class="pill-btn" onclick="openIdCard()" title="عرض الهوية العسكرية" style="color: var(--cyan); border-color: var(--cyan);">
                    <i class="fa-solid fa-id-card"></i> <span id="rankNameDisp">--</span> 
                </div>
            </div>
        </header>

        <div id="dashboardView">
            <img src="yyW7oBx.jpg" class="dashboard-top-logo" alt="شعار الشرطة">
            <div class="main-grid" id="modulesContainer"></div>
        </div>

        <div id="moduleView">
            <div class="module-header">
                <h2 class="module-title" id="mTitle">--</h2>
                <button class="close-btn" onclick="goHome()" style="width: auto; padding: 10px 25px;"><i class="fa-solid fa-arrow-right"></i> العودة</button>
            </div>
            <div id="dynamicContentArea"></div>
            <div class="input-section" id="inputSectionBlock">
                <div id="mInputs"></div>
                <button class="submit-btn" id="submitBtn" onclick="addRecord()" style="margin-top: 15px;">إضافة / حفظ السجل</button>
            </div>
        </div>
    </div>

    <script>
        // 🟢 مصفوفات الرتب الرسمية 🟢
        const publicOfficersList = ["Minister of Interior", "Deputy Minister of Interior", "A. Minister of Interior", "Police Commander", "L.S.P.D Chief", "Deputy L.S.P.D Chief", "A' Lspd Chief", "High Commander", "General", "Colonel", "Major", "Captain", "First Lieutenant", "Lieutenant"];
        const publicEnlistedList = ["Staff Sergeant", "First Sergeant", "Sergeant", "Senior Lead Officer", "Senior Officer", "Officer III", "Officer II", "Officer I", "Solo Cadet", "Cadet"];
        let SystemRanks = [...publicOfficersList, ...publicEnlistedList];

        function createBackgroundEffects() {
            const starBg = document.getElementById('star-bg');
            if(starBg) {
                starBg.innerHTML = '';
                for (let i = 0; i < 40; i++) { 
                    let star = document.createElement('div');
                    star.className = 'star';
                    let size = Math.random() * 3 + 1; 
                    star.style.width = size + 'px';
                    star.style.height = size + 'px';
                    star.style.left = Math.random() * 100 + 'vw';
                    star.style.top = Math.random() * 100 + 'vh';
                    star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    starBg.appendChild(star);
                }
            }

            const pursuitBg = document.getElementById('bg-pursuit');
            if(pursuitBg) {
                pursuitBg.innerHTML = '';
                for(let i=0; i<10; i++) {
                    let line = document.createElement('div');
                    line.className = 'speed-line ' + (Math.random() > 0.7 ? 'red' : '');
                    let leftPos = Math.random() > 0.5 ? (Math.random() * 20) : (80 + Math.random() * 20); 
                    line.style.left = leftPos + 'vw';
                    line.style.animationDuration = (Math.random() * 1.5 + 0.5) + 's';
                    line.style.animationDelay = (Math.random() * 2) + 's';
                    pursuitBg.appendChild(line);
                }
            }
        }
        createBackgroundEffects();

        // 🟢 إعدادات قاعدة البيانات 🟢
        const firebaseConfig = {
            apiKey: "AIzaSyC5PL_fJEjiJVQS8rnx4m8j9uQNsILcQvs",
            authDomain: "police-depa.firebaseapp.com",
            databaseURL: "https://police-depa-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "police-depa"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 🟢 الأقسام الأساسية (بدون تقديم وقوانين الزوار) 🟢
        const modules = [
            { id: 'roster_admin', i18n_t: 'إدارة جدول العساكر', isRosterAdmin: true, reqOfficer: true },
            { id: 'reports', i18n_t: 'التقارير والمحاضر', isReportForm: true },
            { id: 'wanted', i18n_t: 'المطلوبين للعدالة', hasImage: true, inputsAr: ['اسم الهدف', 'التهمة', 'الخطورة'] },
            { id: 'tasks', i18n_t: 'المهام العسكرية', isTable: true },
            { id: 'armory', i18n_t: 'مستودع الأسلحة', inputsAr: ['نوع السلاح', 'الرقم التسلسلي', 'المستلم'] },
            { id: 'maps', i18n_t: 'خرائط العمليات', hasImage: true, inputsAr: ['الإحداثيات', 'المنطقة'] },
            { id: 'officials', i18n_t: 'إدارة الحسابات', isAccountsForm: true, reqOfficer: true },
            { id: 'blackbox', i18n_t: 'الصندوق الأسود', inputsAr: ['رقم السجل', 'كود الوصول'] }
        ];

        let db = { reports: [], wanted: [], maps: [], officials: [], tasks: [], video: [], gangs: [], armory: [], notes: [], saved: [], blackbox: [], crypto: [], customUsers: [], live_roster: {} };
        let currentModule = null; let myRankIdx = 99; let isOfficer = false; let myName = ""; let myDept = ""; let myRank = ""; let configOfficers = [];

        function cleanArray(data) {
            if (!data) return [];
            if (Array.isArray(data)) return data.filter(item => item !== null && item !== undefined);
            return Object.values(data).filter(item => item !== null && item !== undefined);
        }

        database.ref('lspd_db').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                db.reports = cleanArray(data.reports); db.tasks = cleanArray(data.tasks); db.wanted = cleanArray(data.wanted); db.maps = cleanArray(data.maps); db.officials = cleanArray(data.officials); db.video = cleanArray(data.video); db.gangs = cleanArray(data.gangs); db.armory = cleanArray(data.armory); db.notes = cleanArray(data.notes); db.saved = cleanArray(data.saved); db.blackbox = cleanArray(data.blackbox); db.crypto = cleanArray(data.crypto); db.customUsers = cleanArray(data.customUsers); 
            }
            if (currentModule && document.getElementById('moduleView').style.display === 'flex') {
                if(!currentModule.isRosterAdmin) openMod(currentModule.id);
            }
        });

        database.ref('live_roster').on('value', (snapshot) => {
            db.live_roster = snapshot.val() || {};
            if(currentModule && currentModule.isRosterAdmin) renderAdminRoster(); 
        });

        function saveDB() { database.ref('lspd_db').set(db).catch(err => { showCustomAlert("خطأ", "فشل الحفظ.", false); }); }

        // 🟢 تسجيل الدخول 🟢
        function login() {
            const u = document.getElementById('userInput').value.trim(), p = document.getElementById('passInput').value.trim();
            let confUsers = (typeof ConfigUsers !== 'undefined') ? ConfigUsers : [];
            let confOff = (typeof OfficerRanks !== 'undefined') ? OfficerRanks : publicOfficersList;
            configOfficers = confOff; SystemRanks = [...confOff, ...publicEnlistedList];
            let foundUser = [...confUsers, ...(db.customUsers || [])].find(x => x.user === u && x.pass === p);
            
            if(foundUser) {
                document.getElementById('loginScreen').style.display = 'none'; 
                document.getElementById('mainWrapper').style.display = 'flex'; 
                
                myRankIdx = SystemRanks.indexOf(foundUser.rank); if(myRankIdx === -1) myRankIdx = 999; 
                isOfficer = configOfficers.includes(foundUser.rank); myName = foundUser.name; myRank = foundUser.rank; myDept = foundUser.dept || "";
                document.getElementById('rankNameDisp').innerText = myDept ? `${myName} (${myDept})` : myName; 
                
                const savedImg = localStorage.getItem('user_id_img_' + myName);
                if(savedImg) document.getElementById('cardImage').src = savedImg;

                renderModules();
            } else { 
                document.getElementById('loginError').style.display = 'block'; 
            }
        }

        function openIdCard() { document.getElementById('cardNameDisp').innerText = myName; document.getElementById('cardRankDisp').innerText = myRank; document.getElementById('idCardOverlay').style.display = 'flex'; }
        function closeIdCard() { document.getElementById('idCardOverlay').style.display = 'none'; }
        function updateCardImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { document.getElementById('cardImage').src = e.target.result; localStorage.setItem('user_id_img_' + myName, e.target.result); };
                reader.readAsDataURL(input.files[0]);
            }
        }
        function logout() { location.reload(); }
        function goHome() { document.getElementById('moduleView').style.display = 'none'; document.getElementById('dashboardView').style.display = 'flex'; }

        function renderModules() {
            const c = document.getElementById('modulesContainer'); c.innerHTML = ''; 
            modules.forEach((m, idx) => { 
                let canView = isOfficer || !m.reqOfficer;
                if (!canView) return; 
                c.innerHTML += `<div class="menu-btn" onclick="openMod('${m.id}')" style="animation: popIn 0.4s ease forwards; animation-delay: ${idx * 0.05}s; opacity: 0;">${m.i18n_t}</div>`; 
            });
        }

        function openMod(id) {
            currentModule = modules.find(m => m.id === id);
            document.getElementById('dashboardView').style.display = 'none'; document.getElementById('moduleView').style.display = 'flex';
            document.getElementById('mTitle').innerText = currentModule.i18n_t;
            const dynamicArea = document.getElementById('dynamicContentArea'), inpArea = document.getElementById('mInputs'), submitBtn = document.getElementById('submitBtn'), inputBlock = document.getElementById('inputSectionBlock');
            
            if(inputBlock) inputBlock.style.display = 'block';

            if(currentModule.isRosterAdmin) { dynamicArea.innerHTML = `<div id="adminRosterContainer"></div>`; inputBlock.style.display = 'none'; renderAdminRoster(); } 
            else if(currentModule.isAccountsForm) {
                dynamicArea.innerHTML = `<div id="mList"></div>`;
                if(isOfficer) { 
                    let rankOptions = ''; SystemRanks.forEach((r, idx) => { if(idx > myRankIdx) rankOptions += `<option value="${r}">${r}</option>`; });
                    submitBtn.style.display = 'block'; 
                    inpArea.innerHTML = `<div class="grid-inputs"><input type="text" id="o-user" class="gen-input" placeholder="اسم المستخدم"><input type="password" id="o-pass" class="gen-input" placeholder="كلمة المرور"><input type="text" id="o-name" class="gen-input" placeholder="الاسم الكامل"><select id="o-rank" class="gen-input"><option value="" disabled selected>اختر الرتبة</option>${rankOptions}</select></div>`;
                } else { submitBtn.style.display = 'none'; inpArea.innerHTML = `<div style="color:var(--yellow); text-align:center; font-weight:bold; font-size:1.2rem;">لا تملك الصلاحية لإدارة الحسابات</div>`; }
                renderAccounts();
            } else if(currentModule.isReportForm) {
                dynamicArea.innerHTML = `<div id="mList"></div>`; submitBtn.style.display = 'block';
                inpArea.innerHTML = `<div class="grid-inputs"><input type="text" id="r-badge" class="gen-input" placeholder="البادج العسكري"><input type="text" id="r-name" class="gen-input" placeholder="الاسم الكامل"></div><input type="text" id="r-crim" class="gen-input" placeholder="نوع التقرير / التهمة"><textarea id="r-details" class="gen-input" placeholder="اكتب التقرير بالكامل هنا..." style="height:120px; resize:vertical;"></textarea>`;
                renderRecords();
            } else if(currentModule.isTable) {
                dynamicArea.innerHTML = `<div id="tasksTableContainer"></div>`; submitBtn.style.display = 'block';
                inpArea.innerHTML = `<div class="grid-inputs"><input type="text" id="t-assignee" class="gen-input" placeholder="المستلم"><input type="text" id="t-officer" class="gen-input" placeholder="المسؤول"><input type="text" id="t-reason" class="gen-input" placeholder="المهمة الموكلة"><input type="number" id="t-pts" class="gen-input" placeholder="النقاط"></div>`;
                renderTasksTable();
            } else {
                submitBtn.style.display = 'block'; dynamicArea.innerHTML = `<div id="mList"></div>`; inpArea.innerHTML = '';
                const arr = currentModule.inputsAr;
                if(arr) { arr.forEach((ph, i) => { inpArea.innerHTML += `<input type="text" id="inp-${i}" class="gen-input" placeholder="${ph}">`; }); }
                renderRecords();
            }
        }

        // 🟢 دالة جدول الإدارة الفخم 🟢
        function renderAdminRoster() {
            const container = document.getElementById('adminRosterContainer'); if(!container) return;
            const data = db.live_roster;
            if (!data || Object.keys(data).length === 0) { container.innerHTML = '<div style="text-align:center; padding:30px; color:#888; font-size:1.2rem;">لا يوجد عساكر مسجلين حالياً في قاعدة البيانات.</div>'; return; }
            
            let htmlString = `
            <div class="roster-wrapper">
                <table class="luxury-table">
                    <thead>
                        <tr>
                            <th>Unit Code</th>
                            <th>Officer Name</th>
                            <th>Rank</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody>`;
            
            const groups = {};
            Object.keys(data).forEach(key => { const off = data[key]; off.id = key; const r = off.rank || 'غير محدد'; if(!groups[r]) groups[r] = []; groups[r].push(off); });
            const sortedRanks = Object.keys(groups).sort((a, b) => { let idxA = SystemRanks.indexOf(a); let idxB = SystemRanks.indexOf(b); if (idxA === -1) idxA = 999; if (idxB === -1) idxB = 999; return idxA - idxB; });

            sortedRanks.forEach(rankName => {
                let icon = 'fa-star'; if (rankName.toLowerCase().includes('cadet') || rankName.toLowerCase().includes('officer')) icon = 'fa-shield-halved'; if (rankName.toLowerCase().includes('sergeant')) icon = 'fa-angles-up';
                htmlString += `<tr class="dept-header"><td colspan="4"><div class="dept-title"><i class="fa-solid ${icon}" style="color:var(--cyan); margin-right: 10px;"></i> ${rankName}</div></td></tr>`;
                
                groups[rankName].sort((a, b) => (a.code || '').localeCompare(b.code || '')).forEach(officer => {
                    htmlString += `
                    <tr class="roster-row">
                        <td style="color: var(--cyan); font-weight: 900;">${officer.code || '-'}</td>
                        <td style="color: #fff;">${officer.name || '-'}</td>
                        <td style="color: #ccc;">${officer.rank || '-'}</td>
                        <td>
                            <button onclick="editOfficerData('${officer.id}', '${officer.name}', '${officer.rank}', '${officer.code}')" class="action-btn-mini btn-edit" title="تعديل بيانات العسكري"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="deleteOfficerFromRoster('${officer.id}', '${officer.name}')" class="action-btn-mini btn-del" title="فصل العسكري نهائياً"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>`;
                });
            });
            container.innerHTML = htmlString + '</tbody></table></div>';
        }

        // 🟢 دوال التعديل والحذف الجديدة 🟢
        function deleteOfficerFromRoster(id, name) {
            if(!isOfficer) return showCustomAlert("خطأ", "لا تملك صلاحية للإدارة", false);
            if(confirm(`هل أنت متأكد من حذف السجل العسكري لـ (${name}) بشكل نهائي؟`)) {
                database.ref(`live_roster/${id}`).remove().then(() => showCustomAlert("تم الفصل", `تم حذف بيانات ${name} بنجاح.`, true));
            }
        }
        
        let currentEditingOfficerId = null;

        function editOfficerData(id, name, currentRank, code) {
            if(!isOfficer) return showCustomAlert("خطأ", "لا تملك صلاحية", false);
            
            currentEditingOfficerId = id;
            document.getElementById('editOfficerName').value = name || '';
            document.getElementById('editOfficerCode').value = code || '';
            
            let rankOptions = '';
            SystemRanks.forEach(r => {
                let isSelected = (r === currentRank) ? 'selected' : '';
                rankOptions += `<option value="${r}" ${isSelected}>${r}</option>`;
            });
            
            document.getElementById('editRankSelect').innerHTML = rankOptions;
            document.getElementById('editRankModal').style.display = 'flex';
        }

        function saveNewOfficerData() {
            let newRank = document.getElementById('editRankSelect').value;
            let newName = document.getElementById('editOfficerName').value.trim();
            let newCode = document.getElementById('editOfficerCode').value.trim();

            if(!newName || !newRank || !newCode) return showCustomAlert("تنبيه", "يرجى تعبئة جميع الحقول (الاسم، الكود، الرتبة).", false);

            if(currentEditingOfficerId) {
                database.ref(`live_roster/${currentEditingOfficerId}`).update({ 
                    rank: newRank,
                    name: newName,
                    code: newCode
                }).then(() => {
                    document.getElementById('editRankModal').style.display = 'none';
                    showCustomAlert("اكتمل التحديث", "تم حفظ بيانات العسكري بنجاح!", true);
                });
            }
        }

        // 🟢 دوال النظام الأخرى 🟢
        function renderAccounts() {
            const list = document.getElementById('mList'); if(!list) return; list.innerHTML = '';
            let configU = (typeof ConfigUsers !== 'undefined') ? ConfigUsers : [];
            let users = [...configU, ...(db.customUsers || [])];
            users.forEach((u, idx) => { 
                let uRankIdx = SystemRanks.indexOf(u.rank); if(uRankIdx === -1) uRankIdx = 999;
                const del = (isOfficer && myRankIdx < uRankIdx && idx >= configU.length) ? `<i class="fa-solid fa-trash action-icon icon-del" onclick="delAccount(${idx - configU.length})" title="حذف الحساب"></i>` : ''; 
                list.innerHTML += `<div class="rec-item allow-select"><div><span style="color:var(--cyan); font-weight:bold;">[${u.rank}]</span> ${u.name}</div>${del}</div>`; 
            });
        }

        function renderRecords() {
            const list = document.getElementById('mList'); if(!list) return; list.innerHTML = '';
            if(!db[currentModule.id] || db[currentModule.id].length === 0) { list.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">لا توجد سجلات حالياً</div>'; return; }
            db[currentModule.id].forEach((rec, idx) => { 
                const del = isOfficer ? `<i class="fa-solid fa-trash action-icon icon-del" onclick="delRec(${idx})" title="حذف السجل"></i>` : ''; 
                list.innerHTML += `<div class="rec-item allow-select" style="flex-direction:row-reverse;"><div style="flex:1; text-align:right;">${rec}</div>${del}</div>`; 
            });
        }

        function renderTasksTable() {
            const container = document.getElementById('tasksTableContainer'); if(!container) return;
            if(!db.tasks || db.tasks.length === 0) { container.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">لا توجد مهام مسجلة حالياً</div>'; return; }
            let html = '<table class="task-table" style="width:100%; border-collapse:collapse;"><tr><th style="padding:15px; color:var(--cyan); border:1px solid rgba(255,255,255,0.1);">المستلم</th><th style="padding:15px; color:var(--cyan); border:1px solid rgba(255,255,255,0.1);">المسؤول</th><th style="padding:15px; color:var(--cyan); border:1px solid rgba(255,255,255,0.1);">المهمة</th><th style="padding:15px; color:var(--cyan); border:1px solid rgba(255,255,255,0.1);">النقاط</th><th style="padding:15px; color:var(--cyan); border:1px solid rgba(255,255,255,0.1);">الحالة</th><th style="padding:15px; color:var(--cyan); border:1px solid rgba(255,255,255,0.1);">إجراء</th></tr>';
            db.tasks.forEach((t, idx) => {
                html += `<tr>
                    <td style="padding:15px; border:1px solid rgba(255,255,255,0.05); color:#fff;">${t.assignee}</td>
                    <td style="padding:15px; border:1px solid rgba(255,255,255,0.05); color:#aaa;">${t.officer}</td>
                    <td style="padding:15px; border:1px solid rgba(255,255,255,0.05); color:#ddd;">${t.reason}</td>
                    <td style="padding:15px; border:1px solid rgba(255,255,255,0.05); color:var(--cyan); font-weight:bold;">${t.pts}</td>
                    <td style="padding:15px; border:1px solid rgba(255,255,255,0.05);">${t.approved ? '<span class="badge-status" style="color:var(--green); border-color:var(--green); background:rgba(0,255,106,0.1);">معتمدة ✔️</span>' : '<span class="badge-status" style="color:var(--yellow); border-color:var(--yellow); background:rgba(255,193,7,0.1);">انتظار ⏳</span>'}</td>
                    <td style="padding:15px; border:1px solid rgba(255,255,255,0.05);">${isOfficer ? `<i class="fa-solid fa-trash action-icon icon-del" onclick="delRec(${idx})"></i>` : ''}</td>
                </tr>`;
            });
            container.innerHTML = html + '</table>';
        }

        function addRecord() {
            try {
                if(currentModule.isAccountsForm) {
                    if(!isOfficer) return; const u = document.getElementById('o-user').value.trim(), p = document.getElementById('o-pass').value.trim(), n = document.getElementById('o-name').value.trim(), r = document.getElementById('o-rank').value;
                    if(!u || !p || !n || !r) return showCustomAlert("تنبيه", "يرجى تعبئة الحقول لإضافة الحساب.", false);
                    db.customUsers = cleanArray(db.customUsers); db.customUsers.push({ user: u, pass: p, name: n, rank: r }); saveDB(); showCustomAlert("نجاح", "تمت إضافة الحساب بنجاح.", true);
                } else if(currentModule.isTable) {
                    const assignee = document.getElementById('t-assignee').value.trim(), officer = document.getElementById('t-officer').value.trim(), reason = document.getElementById('t-reason').value.trim(), pts = document.getElementById('t-pts').value.trim();
                    if(!assignee || !officer || !reason || !pts) return showCustomAlert("تنبيه", "يرجى تعبئة بيانات المهمة بالكامل.", false);
                    db.tasks = cleanArray(db.tasks); db.tasks.push({ assignee, officer, reason, pts, approved: false }); saveDB(); showCustomAlert("نجاح", "تم تسجيل المهمة بانتظار الاعتماد.", true);
                } else if(currentModule.isReportForm) {
                    const badge = document.getElementById('r-badge').value.trim(), name = document.getElementById('r-name').value.trim(), crim = document.getElementById('r-crim').value.trim(), details = document.getElementById('r-details').value.trim();
                    if(!badge || !name || !crim || !details) return showCustomAlert("تنبيه", "تأكد من تعبئة جميع بيانات التقرير.", false);
                    db.reports = cleanArray(db.reports); db.reports.push(`<div style="color:var(--cyan); margin-bottom:10px; font-size:1.2rem; font-weight:bold;">تقرير: ${crim}</div><div style="color:#aaa; font-size:0.9rem; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:10px; margin-bottom:15px;">الضابط المستلم: [${badge}] ${name}</div><div style="line-height:1.8;">${details}</div>`); saveDB(); showCustomAlert("نجاح", "تم حفظ التقرير في النظام.", true);
                } else {
                    let vals = [], empty = false; const arr = currentModule.inputsAr; if(!arr) return;
                    arr.forEach((_, i) => { const v = document.getElementById(`inp-${i}`).value.trim(); if(!v) empty = true; vals.push(v); }); 
                    if(empty) return showCustomAlert("تنبيه", "يرجى تعبئة الحقول المطلوبة.", false);
                    db[currentModule.id] = cleanArray(db[currentModule.id]); let textHtml = '<div>';
                    vals.forEach((v, i) => { textHtml += `<div style="color:#ccc; font-size:1.05rem; margin-bottom:8px;">${arr[i]}: <span style="color:#fff; font-weight:bold;">${v}</span></div>`; }); 
                    db[currentModule.id].push(textHtml + '</div>'); saveDB(); showCustomAlert("نجاح", "تم حفظ السجل.", true);
                }
            } catch(e) { showCustomAlert("خطأ برمجي", "حدثت مشكلة أثناء الحفظ.", false); }
        }

        function delAccount(idx) { if(!isOfficer) return; db.customUsers.splice(idx, 1); saveDB(); }
        function delRec(idx) { if(!isOfficer) return; db[currentModule.id] = cleanArray(db[currentModule.id]); db[currentModule.id].splice(idx, 1); saveDB(); }
        function showCustomAlert(title, message, isSuccess = true) { 
            document.getElementById('alertTitle').innerText = title; 
            document.getElementById('alertMessage').innerText = message; 
            let icon = document.getElementById('alertIcon');
            icon.className = isSuccess ? "fa-solid fa-circle-check" : "fa-solid fa-circle-exclamation";
            icon.style.color = isSuccess ? "var(--green)" : "var(--red)";
            document.getElementById('customAlertOverlay').style.display = 'flex'; 
        }

    </script>

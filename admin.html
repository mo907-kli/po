<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة | L.S.P.D</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Rajdhani:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-deep: #050a15;
            --cyan: #00eaff;
            --cyan-glow: rgba(0, 234, 255, 0.2); /* توهج ناعم جداً */
            --font-ar: 'Tajawal', sans-serif;
            --font-en: 'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        /* إخفاء الماوس الافتراضي لتشغيل الماوس المخصص الخفيف */
        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: var(--font-ar);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: none; /* إخفاء الماوس الافتراضي */
            user-select: none;
        }

        /* =========================================
           1. النجوم السماوية الخفيفة (Particles)
        ========================================= */
        #particles-container {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
        }
        .particle {
            position: absolute; background: var(--cyan); border-radius: 50%;
            animation: floatParticle linear infinite; opacity: 0; /* خفيفة جداً */
            box-shadow: 0 0 5px var(--cyan);
        }
        @keyframes floatParticle {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 0.15; } /* خفيفة مرة */
            90% { opacity: 0.15; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }

        /* =========================================
           2. الماوس المخصص السلس والخفيف (Pointer & Trail)
        ========================================= */
        #cursor-pointer {
            position: fixed; width: 6px; height: 6px; background-color: var(--cyan);
            border-radius: 50%; pointer-events: none; z-index: 99999;
            transform: translate(-50%, -50%); box-shadow: 0 0 10px var(--cyan);
            transition: width 0.15s, height 0.15s;
        }
        #cursor-trail {
            position: fixed; width: 30px; height: 30px; border: 1.5px solid rgba(0, 234, 255, 0.1); /* خفيف مرة */
            border-radius: 50%; pointer-events: none; z-index: 99998;
            transform: translate(-50%, -50%); transition: 0.1s ease-out, width 0.15s, height 0.15s;
        }

        /* تصميم صندوق تسجيل الدخول (Image 1) */
        .login-box {
            position: relative; width: 450px; background: rgba(15, 22, 38, 0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px;
            padding: 50px 40px; text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); z-index: 10;
        }
        .logo-container { margin-bottom: 25px; display: inline-block; }
        .logo-container img {
            width: 100px; height: 100px; border-radius: 50%;
            border: 2px solid var(--cyan); padding: 5px;
            background: rgba(0,0,0,0.3); box-shadow: 0 0 20px var(--cyan-glow);
        }
        .login-box .title {
            font-family: var(--font-en); font-size: 2.2rem; font-weight: 700;
            color: var(--cyan); letter-spacing: 3px; margin-bottom: 35px;
            text-shadow: 0 0 10px var(--cyan);
        }
        .login-box .input-group { position: relative; margin-bottom: 20px; text-align: right; }
        .login-box .input-label { display: block; color: #8da2b5; font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; margin-right: 5px; }
        
        .custom-input {
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 20px; color: #fff; border-radius: 12px; font-family: var(--font-ar);
            font-size: 1.05rem; transition: 0.3s; outline: none; text-align: right;
            cursor: none; /* إخفاء الماوس على الحقول */
        }
        .custom-input:focus { background: rgba(0, 0, 0, 0.5); border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 234, 255, 0.1); }
        
        /* =========================================
           3. زر النبض النيون (Neon Pulse Glow)
        ========================================= */
        .neon-pulse-btn {
            appearance: none; -webkit-appearance: none; width: 100%; padding: 15px;
            background: rgba(0, 0, 0, 0.5); color: var(--cyan); border: 2px solid var(--cyan);
            border-radius: 12px; cursor: none; transition: 0.3s;
            margin-top: 15px; font-family: var(--font-ar); font-weight: 900;
            font-size: 1.2rem; text-transform: uppercase;
            box-shadow: 0 0 10px var(--cyan-glow); /* توهج أساسي */
            animation: neonPulse 2s infinite ease-in-out; /* حركة النبض */
        }
        .neon-pulse-btn:hover {
            background: var(--cyan); color: #000;
            box-shadow: 0 0 30px var(--cyan), inset 0 0 10px rgba(255,255,255,0.5);
            animation: none; /* إيقاف النبض عند التأشير */
        }

        /* تأثير النبض البطيء والخفيف */
        @keyframes neonPulse {
            0%, 100% { box-shadow: 0 0 10px var(--cyan-glow); border-color: var(--cyan); }
            50% { box-shadow: 0 0 25px var(--cyan), inset 0 0 5px var(--cyan-glow); border-color: #fff; }
        }

        .back-link { display: inline-block; margin-top: 25px; color: #666; font-size: 0.95rem; text-decoration: none; transition: 0.3s; font-weight: bold; cursor: none; }
        .back-link:hover { color: #fff; text-shadow: 0 0 5px #fff; }

    </style>
</head>
<body>

    <div id="particles-container"></div>

    <div id="cursor-pointer"></div>
    <div id="cursor-trail"></div>

    <script src="config.js"></script>

    <div class="login-box">
        <div class="logo-container">
            <img src="yyW7oBx.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/100/000000/00eaff?text=LSPD'">
        </div>
        <div class="title">L.S.P.D</div>
        <div class="input-group">
            <label class="input-label">اسم المستخدم</label>
            <input type="text" id="userInput" class="custom-input hover-target" placeholder="أدخل البيانات هنا...">
        </div>
        <div class="input-group">
            <label class="input-label">كلمة المرور</label>
            <input type="password" id="passInput" class="custom-input hover-target" placeholder="••••••••••">
        </div>
        
        <button class="neon-pulse-btn hover-target" id="loginBtn" onclick="login()">دخول للوحة القيادة</button>
        
        <div id="loginError" style="display: none; color: #ff3333; margin-top: 15px; font-weight: bold; background: rgba(255,51,51,0.1); border: 1px solid rgba(255,51,51,0.3); padding: 10px; border-radius: 8px; font-size: 0.95rem;">بيانات الدخول غير صحيحة!</div>
        <a href="index.html" class="back-link hover-target">العودة للموقع الرئيسي</a>
    </div>

    <script>
        // برمجة النجوم السماوية الخفيفة
        const particlesContainer = document.getElementById('particles-container');
        for (let i = 0; i < 60; i++) {
            let particle = document.createElement('div');
            particle.className = 'particle';
            let size = Math.random() * 3 + 1;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.bottom = '-' + size + 'px';
            particle.style.animationDuration = (Math.random() * 15 + 10) + 's'; // بطيئة جداً
            particle.style.animationDelay = Math.random() * 10 + 's';
            particlesContainer.appendChild(particle);
        }

        // برمجة الماوس الخفيف والسلس
        const pointer = document.getElementById('cursor-pointer');
        const trail = document.getElementById('cursor-trail');
        const hoverTargets = document.querySelectorAll('.hover-target');

        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;

            // النقطة تتحرك فورياً
            pointer.style.left = posX + 'px';
            pointer.style.top = posY + 'px';

            // الحلقة تتبع بنعومة
            trail.animate({
                left: posX + 'px',
                top: posY + 'px'
            }, { duration: 120, fill: "forwards" }); // سلسة جداً
        });

        // تأثير تكبير خفيف للماوس عند التأشير
        hoverTargets.forEach(target => {
            target.addEventListener('mouseenter', () => {
                trail.style.width = '45px'; trail.style.height = '45px';
                trail.style.borderColor = 'rgba(0, 234, 255, 0.2)'; // توهج خفيف
            });
            target.addEventListener('mouseleave', () => {
                trail.style.width = '30px'; trail.style.height = '30px';
                trail.style.borderColor = 'rgba(0, 234, 255, 0.1)';
            });
        });

        firebase.initializeApp({ apiKey: "...", authDomain: "...", databaseURL: "...", projectId: "..." });
        const database = firebase.database();
        let db = { customUsers: [] }; 

        database.ref('lspd_db').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.customUsers) {
                db.customUsers = Object.values(data.customUsers).filter(item => item !== null);
            }
        });

        document.getElementById('userInput').addEventListener('keydown', function(e) { if(e.key === 'Enter') login(); });
        document.getElementById('passInput').addEventListener('keydown', function(e) { if(e.key === 'Enter') login(); });

        function login() {
            const u = document.getElementById('userInput').value.trim(), p = document.getElementById('passInput').value.trim();
            let confUsers = (typeof ConfigUsers !== 'undefined') ? ConfigUsers : [];
            let foundUser = [...confUsers, ...(db.customUsers || [])].find(x => x.user === u && x.pass === p);
            
            if(foundUser) {
                // شاشة تسجيل الدخول موجودة في ملف منفصل في التصميم الفعلي، 
                // هنا نقوم بسرد الأكواد الأساسية للواجهة الداكنة فقط.
                localStorage.setItem('lspd_admin_user', JSON.id); // مثال
                window.location.href = 'dashboard.html'; // الانتقال للوحة القيادة
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
    </script>
</body>
</html>

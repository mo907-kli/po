<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة | L.S.P.D</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Rajdhani:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-deep: #020305;
            --glass-bg: rgba(15, 20, 30, 0.9);
            --cyan: #00eaff;
            --red: #ff3333;
            --green: #00ff6a;
            --yellow: #ffc107;
            --font-ar: 'Tajawal', sans-serif;
            --font-en: 'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { background: var(--bg-deep); color: #fff; font-family: var(--font-ar); min-height: 100vh; overflow-x: hidden; }
        input, textarea, select { user-select: text !important; }

        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }

        /* 🟢 شاشة تسجيل الدخول 🟢 */
        #loginScreen { position: fixed; inset: 0; background: var(--bg-deep); z-index: 99999; display: flex; justify-content: center; align-items: center; }
        .login-container { width: 420px; padding: 50px 40px; background: rgba(10, 15, 20, 0.95); border: 1px solid var(--cyan); border-radius: 16px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.9); }
        .login-logo { width: 110px; height: 110px; background: url('yyW7oBx.jpg') center/cover; border-radius: 50%; margin: 0 auto 25px auto; border: 2px solid var(--cyan); box-shadow: 0 0 20px rgba(0,234,255,0.2); }
        .login-input { width: 100%; padding: 15px; background: rgba(0,0,0,0.6); border: 1px solid rgba(0,234,255,0.2); color: #fff; margin-bottom: 15px; border-radius: 8px; outline: none; text-align: center; font-size: 1.1rem;}
        .login-input:focus { border-color: var(--cyan); }
        .submit-btn { width: 100%; padding: 15px; background: var(--cyan); border: none; color: #000; font-weight: 900; font-size: 1.2rem; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px;}
        .submit-btn:hover { background: #fff; transform: translateY(-2px);}

        /* 🟢 لوحة التحكم 🟢 */
        #mainWrapper { display: none; flex-direction: column; min-height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(10,15,25,0.95); }
        .pill-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 30px; color: #ddd; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .pill-btn:hover { background: var(--cyan); color: #000; border-color: var(--cyan); }

        .main-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 80%; max-width: 1000px; margin: 40px auto; }
        .menu-btn { background: rgba(20, 26, 40, 0.8); border: 1px solid rgba(0, 234, 255, 0.15); border-radius: 16px; padding: 30px 20px; text-align: center; font-size: 1.3rem; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .menu-btn:hover { border-color: var(--cyan); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,234,255,0.15); }

        #moduleView { display: none; flex-direction: column; width: 90%; max-width: 1400px; margin: 0 auto; padding: 20px; animation: popIn 0.3s ease; }
        .module-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 20px; flex-direction: row-reverse;}
        
        /* 🟢 جدول الإدارة السريع بدون لاق 🟢 */
        .roster-wrapper { width: 100%; background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 30px; overflow-x: auto; }
        .luxury-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; text-align: center; font-family: 'Rajdhani', 'Tajawal', sans-serif;}
        .luxury-table th { color: var(--cyan); padding: 0 20px 15px; border-bottom: 1px solid rgba(0,234,255,0.3); }
        .roster-row { background: rgba(20, 26, 40, 0.6); transition: 0.2s ease; }
        .roster-row:hover { background: rgba(30, 40, 60, 0.9); transform: translateY(-2px); }
        .luxury-table td { padding: 18px 20px; border-top: 1px solid rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.02); }
        .dept-title { color: #fff; font-size: 1.5rem; font-weight: 900; border-bottom: 2px solid var(--cyan); padding-bottom: 8px; display: inline-block; margin-top: 20px; }

        .action-btn-mini { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 8px 12px; cursor: pointer; font-size: 1.1rem; transition: 0.2s; margin: 0 5px; color: #fff;}
        .btn-edit:hover { background: rgba(255, 193, 7, 0.2); border-color: var(--yellow); color: var(--yellow);}
        .btn-del:hover { background: rgba(255, 51, 51, 0.2); border-color: var(--red); color: var(--red);}

        /* 🟢 النوافذ 🟢 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(3, 5, 9, 0.95); z-index: 100000; display: none; justify-content: center; align-items: center; }
        .modal-box { width: 480px; padding: 40px; background: rgba(10, 15, 25, 0.98); border: 1px solid var(--cyan); border-radius: 16px; animation: popIn 0.3s ease; }
        .gen-input { width: 100%; padding: 15px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: #fff; margin-bottom: 15px; border-radius: 8px; text-align: right; font-family: var(--font-ar);}
        .close-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #ccc; padding: 15px; cursor: pointer; border-radius: 8px; width: 100%; font-family: var(--font-ar); font-weight:bold; font-size:1.1rem;}
        .close-btn:hover { background: rgba(255,51,51,0.2); border-color: var(--red); color:#fff; }
    </style>
</head>
<body>

    <script src="config.js"></script>

    <div id="loginScreen">
        <div class="login-container">
            <div class="login-logo"></div>
            <h2 style="margin-bottom: 30px;">لوحة قيادة الشرطة</h2>
            <input type="text" id="userInput" class="login-input" placeholder="اسم المستخدم">
            <input type="password" id="passInput" class="login-input" placeholder="كلمة المرور">
            <button class="submit-btn" onclick="login()">تسجيل الدخول</button>
            <div id="loginError" style="display: none; color: var(--red); margin-top: 15px; font-weight: bold;">بيانات خاطئة</div>
            <button onclick="window.location.href='index.html'" style="background:transparent; border:none; color:#888; margin-top:20px; text-decoration:underline; cursor:pointer; font-family:var(--font-ar);">العودة للموقع الرئيسي</button>
        </div>
    </div>

    <div id="mainWrapper">
        <header>
            <div style="display:flex; gap:10px;">
                <div class="pill-btn" onclick="logout()" style="border-color: var(--red); color: var(--red);"><i class="fa-solid fa-power-off"></i> خروج</div>
            </div>
            <h2 style="color: #fff; letter-spacing: 2px;">إدارة L.S.P.D</h2>
            <div class="pill-btn" style="color: var(--cyan); border-color: var(--cyan);"><i class="fa-solid fa-id-card"></i> <span id="rankNameDisp">--</span></div>
        </header>

        <div id="dashboardView">
            <div class="main-grid" id="modulesContainer" style="margin-top: 80px;"></div>
        </div>

        <div id="moduleView">
            <div class="module-header">
                <h2 style="color:var(--cyan);" id="mTitle">--</h2>
                <button class="close-btn" onclick="goHome()" style="width: auto; padding: 10px 25px;"><i class="fa-solid fa-arrow-right"></i> العودة للوحة</button>
            </div>
            <div id="dynamicContentArea"></div>
        </div>
    </div>

    <div class="modal-overlay" id="editRankModal">
        <div class="modal-box">
            <h3 style="color:var(--cyan); margin-bottom:25px; text-align:center;">تعديل السجل العسكري</h3>
            <div style="text-align: right; color: #8da2b5; margin-bottom: 5px;">الاسم:</div>
            <input type="text" id="editOfficerName" class="gen-input">
            <div style="text-align: right; color: #8da2b5; margin-bottom: 5px;">الرقم (Unit):</div>
            <input type="text" id="editOfficerCode" class="gen-input">
            <div style="text-align: right; color: #8da2b5; margin-bottom: 5px;">الرتبة:</div>
            <select id="editRankSelect" class="gen-input"></select>
            <div style="display:flex; gap:15px; margin-top: 20px;">
                <button class="submit-btn" onclick="saveNewOfficerData()" style="flex: 2; margin: 0;">حفظ التعديلات</button>
                <button class="close-btn" onclick="document.getElementById('editRankModal').style.display='none'" style="flex: 1; margin: 0;">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const publicOfficersList = ["Minister of Interior", "Deputy Minister of Interior", "A. Minister of Interior", "Police Commander", "L.S.P.D Chief", "Deputy L.S.P.D Chief", "A' Lspd Chief", "High Commander", "General", "Colonel", "Major", "Captain", "First Lieutenant", "Lieutenant"];
        const publicEnlistedList = ["Staff Sergeant", "First Sergeant", "Sergeant", "Senior Lead Officer", "Senior Officer", "Officer III", "Officer II", "Officer I", "Solo Cadet", "Cadet"];
        let SystemRanks = [...publicOfficersList, ...publicEnlistedList];

        const firebaseConfig = {
            apiKey: "AIzaSyC5PL_fJEjiJVQS8rnx4m8j9uQNsILcQvs",
            authDomain: "police-depa.firebaseapp.com",
            databaseURL: "https://police-depa-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "police-depa"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let db = { live_roster: {} };
        let isOfficer = false; let currentEditingOfficerId = null;

        database.ref('live_roster').on('value', (snapshot) => {
            db.live_roster = snapshot.val() || {};
            if(document.getElementById('moduleView').style.display === 'flex') renderAdminRoster(); 
        });

        function login() {
            const u = document.getElementById('userInput').value.trim(), p = document.getElementById('passInput').value.trim();
            let confUsers = (typeof ConfigUsers !== 'undefined') ? ConfigUsers : [];
            let foundUser = confUsers.find(x => x.user === u && x.pass === p);
            
            if(foundUser) {
                document.getElementById('loginScreen').style.display = 'none'; 
                document.getElementById('mainWrapper').style.display = 'flex'; 
                isOfficer = publicOfficersList.includes(foundUser.rank);
                document.getElementById('rankNameDisp').innerText = foundUser.name; 
                renderModules();
            } else { document.getElementById('loginError').style.display = 'block'; }
        }

        function logout() { location.reload(); }
        function goHome() { document.getElementById('moduleView').style.display = 'none'; document.getElementById('dashboardView').style.display = 'flex'; }

        function renderModules() {
            const c = document.getElementById('modulesContainer'); c.innerHTML = ''; 
            if(isOfficer) {
                c.innerHTML += `<div class="menu-btn" onclick="openAdminRoster()"><i class="fa-solid fa-users" style="display:block; font-size:2rem; margin-bottom:15px; color:var(--cyan);"></i> إدارة العساكر</div>`; 
            }
        }

        function openAdminRoster() {
            document.getElementById('dashboardView').style.display = 'none'; 
            document.getElementById('moduleView').style.display = 'flex';
            document.getElementById('mTitle').innerText = 'إدارة جدول العساكر';
            renderAdminRoster();
        }

        function renderAdminRoster() {
            const container = document.getElementById('dynamicContentArea');
            const data = db.live_roster;
            if (!data || Object.keys(data).length === 0) { container.innerHTML = '<div style="text-align:center; padding:30px; color:#888;">لا يوجد بيانات</div>'; return; }
            
            let htmlString = `<div class="roster-wrapper"><table class="luxury-table"><thead><tr><th>Code</th><th>Name</th><th>Rank</th><th>الإجراءات</th></tr></thead><tbody>`;
            
            const groups = {};
            Object.keys(data).forEach(key => { const off = data[key]; off.id = key; const r = off.rank || 'غير محدد'; if(!groups[r]) groups[r] = []; groups[r].push(off); });
            const sortedRanks = Object.keys(groups).sort((a, b) => { let idxA = SystemRanks.indexOf(a); let idxB = SystemRanks.indexOf(b); if (idxA === -1) idxA = 999; if (idxB === -1) idxB = 999; return idxA - idxB; });

            sortedRanks.forEach(rankName => {
                htmlString += `<tr class="dept-header"><td colspan="4"><div class="dept-title">${rankName}</div></td></tr>`;
                groups[rankName].sort((a, b) => (a.code || '').localeCompare(b.code || '')).forEach(officer => {
                    htmlString += `
                    <tr class="roster-row">
                        <td style="color: var(--cyan); font-weight: 900;">${officer.code || '-'}</td>
                        <td style="color: #fff;">${officer.name || '-'}</td>
                        <td style="color: #ccc;">${officer.rank || '-'}</td>
                        <td>
                            <button onclick="editOfficerData('${officer.id}', '${officer.name}', '${officer.rank}', '${officer.code}')" class="action-btn-mini btn-edit"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="deleteOfficer('${officer.id}', '${officer.name}')" class="action-btn-mini btn-del"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>`;
                });
            });
            container.innerHTML = htmlString + '</tbody></table></div>';
        }

        function deleteOfficer(id, name) {
            if(confirm(`حذف العسكري (${name}) نهائياً؟`)) { database.ref(`live_roster/${id}`).remove(); }
        }
        
        function editOfficerData(id, name, currentRank, code) {
            currentEditingOfficerId = id;
            document.getElementById('editOfficerName').value = name || '';
            document.getElementById('editOfficerCode').value = code || '';
            let rankOptions = ''; SystemRanks.forEach(r => { rankOptions += `<option value="${r}" ${(r === currentRank) ? 'selected' : ''}>${r}</option>`; });
            document.getElementById('editRankSelect').innerHTML = rankOptions;
            document.getElementById('editRankModal').style.display = 'flex';
        }

        function saveNewOfficerData() {
            let newRank = document.getElementById('editRankSelect').value, newName = document.getElementById('editOfficerName').value.trim(), newCode = document.getElementById('editOfficerCode').value.trim();
            if(!newName || !newRank || !newCode) return alert("يرجى تعبئة جميع الحقول.");
            if(currentEditingOfficerId) {
                database.ref(`live_roster/${currentEditingOfficerId}`).update({ rank: newRank, name: newName, code: newCode }).then(() => {
                    document.getElementById('editRankModal').style.display = 'none';
                });
            }
        }
    </script>
</body>
</html>

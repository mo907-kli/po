<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة | L.S.P.D</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Rajdhani:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-deep: #020305;
            --glass-bg: rgba(10, 15, 25, 0.85);
            --glass-border: rgba(0, 234, 255, 0.15);
            --cyan: #00eaff;
            --cyan-glow: rgba(0, 234, 255, 0.4);
            --red: #ff3333;
            --green: #00ff6a;
            --yellow: #ffc107;
            --font-ar: 'Tajawal', sans-serif;
            --font-en: 'Rajdhani', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { background: var(--bg-deep); color: #fff; font-family: var(--font-ar); min-height: 100vh; overflow-x: hidden; }
        input, textarea, select { user-select: text !important; outline: none; font-family: var(--font-ar);}

        /* 🟢 الخلفية الفخمة 🟢 */
        #bgEffects { position: fixed; inset: 0; z-index: -5; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.4; }
        .light-red { position: absolute; top: -30%; left: -20%; width: 70vw; height: 70vw; background: radial-gradient(circle, rgba(255, 0, 40, 0.05) 0%, transparent 70%); mix-blend-mode: screen; }
        .light-blue { position: absolute; bottom: -30%; right: -20%; width: 70vw; height: 70vw; background: radial-gradient(circle, rgba(0, 160, 255, 0.05) 0%, transparent 70%); mix-blend-mode: screen; }

        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 🟢 شاشة تسجيل الدخول 🟢 */
        #loginScreen { position: fixed; inset: 0; background: rgba(2, 3, 5, 0.95); z-index: 99999; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(10px); transition: 0.3s;}
        .login-container { width: 400px; padding: 50px 40px; background: rgba(10, 15, 20, 0.9); border: 1px solid var(--cyan); border-radius: 16px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 20px rgba(0,234,255,0.1); animation: popIn 0.3s ease; }
        .login-logo { width: 100px; height: 100px; background: url('yyW7oBx.jpg') center/cover; border-radius: 50%; margin: 0 auto 25px; border: 2px solid var(--cyan); box-shadow: 0 0 20px var(--cyan-glow); }
        .inp-group { position: relative; margin-bottom: 20px; }
        .inp-group i { position: absolute; top: 50%; transform: translateY(-50%); color: var(--cyan); right: 15px; font-size: 1.1rem;}
        .login-input { width: 100%; padding: 15px 40px 15px 15px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px; transition: 0.3s; text-align: right;}
        .login-input:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,234,255,0.2);}
        .submit-btn { width: 100%; padding: 15px; background: var(--cyan); border: none; color: #000; font-weight: 900; font-size: 1.2rem; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px;}
        .submit-btn:hover { background: #fff; box-shadow: 0 0 20px var(--cyan-glow); transform: translateY(-2px);}

        /* 🟢 لوحة القيادة (تطابق الصورة 4) 🟢 */
        #mainWrapper { display: none; flex-direction: column; min-height: 100vh; animation: fadeIn 0.4s ease;}
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(10,15,25,0.8); backdrop-filter: blur(10px);}
        .header-side { display: flex; gap: 15px; align-items: center; }
        
        /* الأزرار العلوية */
        .head-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 8px; color: #ccc; font-weight: bold; cursor: pointer; transition: 0.2s; font-family: var(--font-ar); text-decoration: none;}
        .head-btn:hover { background: rgba(255,255,255,0.05); border-color: #fff; color: #fff; }
        .btn-red { border-color: var(--red); color: var(--red); }
        .btn-red:hover { background: rgba(255,51,51,0.1); color: var(--red); border-color: var(--red); }
        .btn-cyan { border-color: var(--cyan); color: var(--cyan); }
        .btn-cyan:hover { background: rgba(0,234,255,0.1); color: var(--cyan); }

        .sys-title { font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; }

        /* الأقسام والمربعات */
        #dashboardView { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 40px;}
        .watermark-logo { width: 350px; height: 350px; opacity: 0.05; background: url('yyW7oBx.jpg') center/cover; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;}
        .main-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 1000px; position: relative; z-index: 10;}
        
        .menu-btn { 
            background: rgba(15, 20, 30, 0.85); border: 1px solid var(--glass-border); border-radius: 12px; 
            padding: 30px 20px; text-align: center; color: #fff; font-size: 1.25rem; font-weight: 800; cursor: pointer; 
            transition: 0.3s; backdrop-filter: blur(10px); box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .menu-btn:hover { border-color: var(--cyan); transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,234,255,0.15); text-shadow: 0 0 10px rgba(0,234,255,0.5); }

        /* 🟢 جدول الإدارة الشامل 🟢 */
        #moduleView { display: none; flex-direction: column; width: 95%; max-width: 1600px; margin: 0 auto; padding-top: 30px; animation: popIn 0.3s ease; }
        .roster-wrapper { width: 100%; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); overflow-x: auto; backdrop-filter: blur(15px); }
        .roster-wrapper::-webkit-scrollbar { height: 6px; } .roster-wrapper::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 6px; }
        
        .luxury-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; text-align: center; font-family: 'Rajdhani', 'Tajawal', sans-serif;}
        .luxury-table thead th { color: var(--cyan); font-size: 1rem; font-weight: 900; letter-spacing: 2px; padding: 15px; border-bottom: 2px solid rgba(0,234,255,0.2); }
        .roster-row { background: rgba(20, 26, 40, 0.7); transition: 0.2s; }
        .roster-row:hover { background: rgba(30, 40, 60, 0.95); transform: scale(1.005); box-shadow: 0 5px 15px rgba(0,234,255,0.1); }
        .luxury-table td { padding: 15px; color: #d1d1d1; font-size: 1.05rem; font-weight: 600; border-top: 1px solid rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.02); white-space: nowrap;}
        .luxury-table td:first-child { border-radius: 8px 0 0 8px; border-left: 3px solid var(--cyan); color: var(--cyan); font-weight: 900;}
        .luxury-table td:last-child { border-radius: 0 8px 8px 0; border-right: 1px solid rgba(255,255,255,0.02); }
        
        .dept-title { color: #fff; font-size: 1.5rem; font-weight: 900; padding: 30px 0 10px 0; text-align: left; border-bottom: 2px solid var(--cyan); display: inline-block; letter-spacing: 2px; text-shadow: 0 0 15px var(--cyan-glow);}

        .action-btn { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 8px 12px; cursor: pointer; transition: 0.2s; margin: 0 4px;}
        .btn-edit { color: var(--yellow); } .btn-edit:hover { border-color: var(--yellow); background: rgba(255,193,7,0.1); }
        .btn-del { color: var(--red); } .btn-del:hover { border-color: var(--red); background: rgba(255,51,51,0.1); }

        /* 🟢 النوافذ المنبثقة للوحة التحكم 🟢 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(3, 5, 9, 0.95); z-index: 100000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-box { width: 500px; padding: 40px; background: rgba(10, 15, 25, 0.98); border: 1px solid var(--cyan); border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); animation: popIn 0.3s ease; }
        .gen-input { width: 100%; padding: 15px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: #fff; margin-bottom: 15px; border-radius: 8px; text-align: right; }
        .gen-input:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,234,255,0.2); }
        select.gen-input option { background: #0b0e14; }
        .close-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #ccc; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: bold; width: 100%;}
        .close-btn:hover { background: rgba(255,51,51,0.2); border-color: var(--red); color: #fff;}
    </style>
</head>
<body>

    <script src="config.js"></script>

    <div id="bgEffects">
        <div id="star-bg"></div>
        <div id="bg-lights"><div class="light-red"></div><div class="light-blue"></div></div>
    </div>

    <div id="loginScreen">
        <div class="login-container">
            <div class="login-logo"></div>
            <div style="font-size: 1.8rem; font-weight: 900; margin-bottom: 30px; letter-spacing: 1px;">نظام إدارة الشرطة</div>
            <div class="inp-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="userInput" class="login-input" placeholder="اسم المستخدم">
            </div>
            <div class="inp-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="passInput" class="login-input" placeholder="كلمة المرور">
            </div>
            <button class="submit-btn" onclick="login()">دخول للوحة القيادة</button>
            <div id="loginError" style="display: none; color: var(--red); margin-top: 15px; font-weight: bold; background: rgba(255,51,51,0.1); border: 1px solid var(--red); padding: 10px; border-radius: 6px;">بيانات غير صحيحة!</div>
            <button onclick="window.location.href='index.html'" style="background: transparent; border: none; color: #888; margin-top: 25px; cursor: pointer; text-decoration: underline; font-family: var(--font-ar);">العودة للموقع الرئيسي</button>
        </div>
    </div>

    <div id="mainWrapper">
        <header>
            <div class="header-side">
                <button class="head-btn btn-red" onclick="logout()"><i class="fa-solid fa-power-off"></i> خروج</button>
                <button class="head-btn" onclick="window.location.href='index.html'"><i class="fa-solid fa-house"></i> الرئيسية</button>
            </div>
            <div class="sys-title">لوحة القيادة | L.S.P.D</div>
            <div class="header-side">
                <button class="head-btn btn-cyan" onclick="document.getElementById('idCardOverlay').style.display='flex'"><i class="fa-solid fa-id-card"></i> هويتي العسكرية</button>
            </div>
        </header>

        <div id="dashboardView">
            <div class="watermark-logo"></div>
            <div class="main-grid" id="modulesContainer">
                </div>
        </div>

        <div id="moduleView">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="mTitle" style="color: var(--cyan); font-size: 2rem; font-weight: 900; text-shadow: 0 0 15px var(--cyan-glow);">--</h2>
                <button class="head-btn" onclick="document.getElementById('moduleView').style.display='none'; document.getElementById('dashboardView').style.display='flex';"><i class="fa-solid fa-arrow-right"></i> العودة للوحة القيادة</button>
            </div>
            <div id="dynamicContentArea"></div>
        </div>
    </div>

    <div class="modal-overlay" id="editRankModal">
        <div class="modal-box">
            <h3 style="color:var(--cyan); margin-bottom:25px; font-size:1.6rem; text-align:center;">تعديل السجل العسكري</h3>
            <div style="text-align: right; color: #8da2b5; font-weight: bold; margin-bottom: 5px;">الاسم الشخصي:</div>
            <input type="text" id="editOfficerName" class="gen-input">
            <div style="text-align: right; color: #8da2b5; font-weight: bold; margin-bottom: 5px;">الرقم العسكري (Code):</div>
            <input type="text" id="editOfficerCode" class="gen-input">
            <div style="text-align: right; color: #8da2b5; font-weight: bold; margin-bottom: 5px;">الرتبة العسكرية:</div>
            <select id="editRankSelect" class="gen-input" style="cursor: pointer;"></select>
            <div style="display:flex; gap:15px; margin-top: 10px;">
                <button class="submit-btn" onclick="saveNewOfficerData()" style="flex: 2; margin: 0;">حفظ التعديلات</button>
                <button class="close-btn" onclick="document.getElementById('editRankModal').style.display='none'" style="flex: 1;">إلغاء</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="idCardOverlay">
        <div style="text-align: center;">
            <div style="width: 650px; height: 300px; background: #0b0e14; border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.9); display: flex; flex-direction: row-reverse; align-items: center; padding: 30px; position: relative; border: 1px solid rgba(255,255,255,0.05); border-right: 3px solid var(--cyan);">
                <div style="width: 200px; display: flex; flex-direction: column; align-items: center;">
                    <div style="width: 150px; height: 150px; border-radius: 20px; border: 2px solid var(--cyan); padding: 4px; box-shadow: 0 0 20px rgba(0,234,255,0.2);"><img id="cardImage" src="https://cdn.discordapp.com/attachments/1079065638502404167/1476016754705567824/D25Todl.png" style="width: 100%; height: 100%; object-fit: cover; border-radius: 16px;"></div>
                </div>
                <div style="width: calc(100% - 220px); text-align: right; display: flex; flex-direction: column; align-items: flex-end;">
                    <div style="color: #666; font-family: var(--font-en); font-weight: 800; letter-spacing: 3px;">L.S.P.D EXECUTIVE ID</div>
                    <h2 id="cardNameDisp" style="font-size: 2.8rem; font-weight: 900; color: #fff; font-family: var(--font-en); margin: 0;">--</h2>
                    <div id="cardRankDisp" style="color: var(--cyan); font-family: var(--font-en); font-size: 1.3rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; margin: 5px 0 20px 0;">--</div>
                    <div style="border-top: 1px solid rgba(255,255,255,0.05); width: 100%; margin-bottom: 20px;"></div>
                    <div style="display: inline-flex; align-items: center; gap: 10px; background: rgba(0, 255, 106, 0.05); border: 1px solid rgba(0, 255, 106, 0.3); padding: 8px 20px; border-radius: 8px; font-family: var(--font-en); font-weight: 800; color: var(--green); flex-direction: row-reverse;">SYSTEM ACTIVE <span style="width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green);"></span></div>
                </div>
            </div>
            <div style="margin-top: 30px; display: flex; justify-content: center; gap: 15px;">
                <label class="head-btn btn-cyan" style="cursor: pointer; padding: 15px 30px;"><i class="fa-solid fa-camera"></i> تغيير الصورة<input type="file" id="cardImageInput" accept="image/*" style="display: none;" onchange="updateCardImg(this)"></label>
                <button class="head-btn btn-red" onclick="document.getElementById('idCardOverlay').style.display='none'" style="padding: 15px 40px;">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        const publicOfficersList = ["Minister of Interior", "Deputy Minister of Interior", "A. Minister of Interior", "Police Commander", "L.S.P.D Chief", "Deputy L.S.P.D Chief", "A' Lspd Chief", "High Commander", "General", "Colonel", "Major", "Captain", "First Lieutenant", "Lieutenant"];
        const publicEnlistedList = ["Staff Sergeant", "First Sergeant", "Sergeant", "Senior Lead Officer", "Senior Officer", "Officer III", "Officer II", "Officer I", "Solo Cadet", "Cadet"];
        let SystemRanks = [...publicOfficersList, ...publicEnlistedList];

        function createBackgroundEffects() {
            const starBg = document.getElementById('star-bg');
            for (let i = 0; i < 40; i++) { 
                let star = document.createElement('div'); star.className = 'star';
                star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
                star.style.left = Math.random() * 100 + 'vw'; star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's'; starBg.appendChild(star);
            }
        }
        createBackgroundEffects();

        const firebaseConfig = {
            apiKey: "AIzaSyC5PL_fJEjiJVQS8rnx4m8j9uQNsILcQvs", authDomain: "police-depa.firebaseapp.com",
            databaseURL: "https://police-depa-default-rtdb.europe-west1.firebasedatabase.app", projectId: "police-depa"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 🟢 الأقسام (تطابق الصورة 4) 🟢
        const modules = [
            { id: 'settings', i18n_t: 'إعدادات التقديم', reqOfficer: true },
            { id: 'applications', i18n_t: 'طلبات التقديم', reqOfficer: true },
            { id: 'roster_admin', i18n_t: 'إدارة جدول العساكر', isRosterAdmin: true, reqOfficer: true },
            { id: 'reports', i18n_t: 'التقارير والمحاضر' },
            { id: 'crypto', i18n_t: 'قسم التشفير' },
            { id: 'blackbox', i18n_t: 'الصندوق الأسود' },
            { id: 'tasks', i18n_t: 'المهام والنقاط' },
            { id: 'notes', i18n_t: 'ملاحظات القيادة' },
            { id: 'maps', i18n_t: 'خرائط العمليات' },
            { id: 'video', i18n_t: 'قسم الفيديو' },
            { id: 'wanted', i18n_t: 'المطلوبين للعدالة' },
            { id: 'saved', i18n_t: 'التقارير المحفوظة' },
            { id: 'armory', i18n_t: 'مستودع الأسلحة' },
            { id: 'officials', i18n_t: 'إدارة الحسابات', reqOfficer: true },
            { id: 'gangs', i18n_t: 'قسم العصابات' }
        ];

        let db = { live_roster: {} }; let isOfficer = false; let myName = ""; let myRank = ""; 

        database.ref('live_roster').on('value', (snapshot) => {
            db.live_roster = snapshot.val() || {};
            if(document.getElementById('moduleView').style.display === 'flex' && document.getElementById('mTitle').innerText === 'إدارة جدول العساكر') {
                renderAdminRoster();
            }
        });

        function login() {
            const u = document.getElementById('userInput').value.trim(), p = document.getElementById('passInput').value.trim();
            let confUsers = (typeof ConfigUsers !== 'undefined') ? ConfigUsers : [];
            let foundUser = confUsers.find(x => x.user === u && x.pass === p);
            
            if(foundUser) {
                document.getElementById('loginScreen').style.display = 'none'; 
                document.getElementById('mainWrapper').style.display = 'flex'; 
                
                isOfficer = publicOfficersList.includes(foundUser.rank); myName = foundUser.name; myRank = foundUser.rank;
                document.getElementById('cardNameDisp').innerText = myName; document.getElementById('cardRankDisp').innerText = myRank;
                
                const savedImg = localStorage.getItem('user_id_img_' + myName);
                if(savedImg) document.getElementById('cardImage').src = savedImg;

                renderModules();
            } else { document.getElementById('loginError').style.display = 'block'; }
        }

        function logout() { location.reload(); }
        function updateCardImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { document.getElementById('cardImage').src = e.target.result; localStorage.setItem('user_id_img_' + myName, e.target.result); };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function renderModules() {
            const c = document.getElementById('modulesContainer'); c.innerHTML = ''; 
            modules.forEach((m) => { 
                if (m.reqOfficer && !isOfficer) return; 
                c.innerHTML += `<div class="menu-btn" onclick="openMod('${m.id}')">${m.i18n_t}</div>`; 
            });
        }

        function openMod(id) {
            let mod = modules.find(m => m.id === id);
            document.getElementById('dashboardView').style.display = 'none'; 
            document.getElementById('moduleView').style.display = 'flex';
            document.getElementById('mTitle').innerText = mod.i18n_t;
            
            const container = document.getElementById('dynamicContentArea'); container.innerHTML = '';

            if(mod.isRosterAdmin) {
                renderAdminRoster();
            } else {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:#888; font-size:1.5rem; background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:16px;">مرحباً بك في ${mod.i18n_t} (قيد التطوير)</div>`;
            }
        }

        // 🟢 الجدول الاحترافي داخل لوحة التحكم (الذي يطابق إكسل) 🟢
        function renderAdminRoster() {
            const container = document.getElementById('dynamicContentArea');
            const data = db.live_roster;
            if (!data || Object.keys(data).length === 0) { container.innerHTML = '<div style="text-align:center; padding:50px; color:#888;">لا يوجد بيانات.</div>'; return; }
            
            let htmlString = `
            <div class="roster-wrapper">
                <table class="luxury-table">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Name</th>
                            <th>Rank</th>
                            <th>Responsibility</th>
                            <th>Status</th>
                            <th>Discord ID</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody>`;
            
            const groups = {};
            Object.keys(data).forEach(key => { const off = data[key]; off.id = key; const r = off.rank || 'غير محدد'; if(!groups[r]) groups[r] = []; groups[r].push(off); });
            const sortedRanks = Object.keys(groups).sort((a, b) => { let idxA = SystemRanks.indexOf(a); let idxB = SystemRanks.indexOf(b); if (idxA === -1) idxA = 999; if (idxB === -1) idxB = 999; return idxA - idxB; });

            sortedRanks.forEach(rankName => {
                htmlString += `<tr><td colspan="7" style="border:none;"><div class="dept-title">${rankName}</div></td></tr>`;
                
                groups[rankName].sort((a, b) => (a.code || '').localeCompare(b.code || '')).forEach(officer => {
                    htmlString += `
                    <tr class="roster-row">
                        <td style="color: var(--cyan); font-weight: 900;">${officer.code || '-'}</td>
                        <td style="color: #fff; font-family: var(--font-ar);">${officer.name || '-'}</td>
                        <td style="color: #ccc;">${officer.rank || '-'}</td>
                        <td style="color: #ccc;">${officer.dept || '-'}</td>
                        <td><div style="background: rgba(0, 255, 106, 0.1); border: 1px solid rgba(0, 255, 106, 0.3); color: var(--green); padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: 800; display:inline-block;">${officer.status || 'ACTIVE'}</div></td>
                        <td><span style="background: rgba(0,0,0,0.4); padding: 5px 10px; border-radius: 6px; font-family: monospace; color: #8da2b5; border: 1px solid rgba(255,255,255,0.05);">${officer.discordId || '-'}</span></td>
                        <td>
                            <button onclick="editOfficerData('${officer.id}', '${officer.name}', '${officer.rank}', '${officer.code}')" class="action-btn btn-edit" title="تعديل"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="deleteOfficerFromRoster('${officer.id}', '${officer.name}')" class="action-btn btn-del" title="فصل"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>`;
                });
            });
            container.innerHTML = htmlString + '</tbody></table></div>';
        }

        function deleteOfficerFromRoster(id, name) {
            if(!isOfficer) return;
            if(confirm(`هل أنت متأكد من حذف العسكري (${name}) نهائياً؟`)) { database.ref(`live_roster/${id}`).remove(); }
        }
        
        let currentEditingOfficerId = null;

        function editOfficerData(id, name, currentRank, code) {
            currentEditingOfficerId = id;
            document.getElementById('editOfficerName').value = name || '';
            document.getElementById('editOfficerCode').value = code || '';
            
            let rankOptions = '';
            SystemRanks.forEach(r => { rankOptions += `<option value="${r}" ${r===currentRank ? 'selected' : ''}>${r}</option>`; });
            document.getElementById('editRankSelect').innerHTML = rankOptions;
            
            document.getElementById('editRankModal').style.display = 'flex';
        }

        function saveNewOfficerData() {
            let newRank = document.getElementById('editRankSelect').value, newName = document.getElementById('editOfficerName').value.trim(), newCode = document.getElementById('editOfficerCode').value.trim();
            if(!newName || !newRank || !newCode) return alert("يرجى تعبئة الحقول الأساسية.");

            if(currentEditingOfficerId) {
                database.ref(`live_roster/${currentEditingOfficerId}`).update({ rank: newRank, name: newName, code: newCode }).then(() => {
                    document.getElementById('editRankModal').style.display = 'none';
                });
            }
        }
    </script>
</body>
</html>
